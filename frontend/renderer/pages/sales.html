<!-- Sales Page Content -->
<div id="page-sales" class="page-content animate-fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Sales History</h1>
        <button id="btn-record-sale"
            class="flex items-center gap-2 btn-primary px-4 py-2 rounded-lg text-sm transition-all shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Record New Sale
        </button>
    </div>

    <!-- Recent Sales -->
    <div class="dashboard-panel overflow-hidden">
        <div class="p-5 border-b border-gray-100">
            <h2 class="dashboard-panel-title">Today's Transactions</h2>
        </div>
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Item</th>
                    <th>Qty/Metres</th>
                    <th>Amount</th>
                    <th>Payment</th>
                    <th>Customer</th>
                </tr>
            </thead>
            <tbody id="sales-table-body">
                <tr>
                    <td colspan="6" class="px-5 py-8 text-center text-gray-500">No sales recorded today.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Record Sale Modal -->
    <div id="modal-record-sale" class="modal-overlay">
        <div class="modal-container" style="max-width: 800px;"> <!-- Wider modal for sales -->
            <div class="modal-header">
                <h3 class="modal-title">Record New Sale</h3>
                <button class="modal-close-btn" id="btn-close-sale-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div class="modal-body">
                <!-- Sale Type Tabs -->
                <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg w-fit mx-auto">
                    <button id="tab-stock-sale"
                        class="px-4 py-2 bg-white text-black font-medium rounded-md text-sm shadow-sm transition-all">
                        Sticker Sale (Stock)
                    </button>
                    <button id="tab-product-sale"
                        class="px-4 py-2 text-gray-500 font-medium rounded-md text-sm hover:bg-gray-200 transition-all">
                        Product Sale
                    </button>
                </div>

                <!-- Stock Sale Form -->
                <div id="stock-sale-section">
                    <form id="stock-sale-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Select Sticker Color</label>
                                <div id="stock-color-dropdown"></div>
                                <input type="hidden" name="stock_id" id="sale-stock-id-input">
                                <p id="stock-remaining-info" class="text-xs text-gray-500 mt-1"></p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Sale Type</label>
                                <div id="sale-type-dropdown"></div>
                                <input type="hidden" name="sale_unit" id="sale-unit-input" value="metres">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span id="quantity-label">Metres Sold</span>
                                </label>
                                <input type="number" name="stock_quantity" id="sale-stock-quantity" min="1" value="1"
                                    step="0.1" class="w-full">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span id="metres-deducted-label">Metres to Deduct</span>
                                </label>
                                <div class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-lg font-bold text-gray-900"
                                    id="metres-to-deduct">0m</div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Price per Metre
                                    (KSh)</label>
                                <input type="number" name="price_per_metre" id="sale-price-per-metre" min="0"
                                    step="0.01" value="10" class="w-full">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method</label>
                                <div id="payment-method-dropdown"></div>
                                <input type="hidden" name="payment_method" id="payment-method-input" value="cash">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                                <input type="text" name="customer_name" class="w-full" placeholder="Walk-in customer">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Total Amount</label>
                                <div class="px-3 py-2 bg-black text-white rounded-lg text-lg font-bold"
                                    id="stock-sale-total">KSh 0.00</div>
                            </div>
                        </div>
                        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                            <button type="button" class="btn-secondary px-4 py-2 rounded-lg"
                                id="btn-cancel-sale-1">Cancel</button>
                            <button type="submit" class="btn-primary px-4 py-2 rounded-lg hover:bg-gray-800">Complete
                                Sale</button>
                        </div>
                    </form>
                </div>

                <!-- Product Sale Form (Hidden by default) -->
                <div id="product-sale-section" class="hidden">
                    <form id="sale-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Select Product</label>
                                <select name="product_id" id="sale-product" class="w-full">
                                    <option value="">Choose a product</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                                <input type="number" name="quantity" id="sale-quantity" min="1" value="1"
                                    class="w-full">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method</label>
                                <select name="payment_method" class="w-full">
                                    <option value="cash">Cash</option>
                                    <option value="mpesa">M-Pesa</option>
                                    <option value="card">Card</option>
                                    <option value="credit">Credit (Add to Debt)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                                <input type="text" name="customer_name" class="w-full" placeholder="Walk-in customer">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Discount (%)</label>
                                <input type="number" name="discount" id="sale-discount" min="0" max="100" value="0"
                                    class="w-full">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Total</label>
                                <div class="px-3 py-2 bg-black text-white rounded-lg text-lg font-bold" id="sale-total">
                                    KSh 0.00</div>
                            </div>
                        </div>
                        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                            <button type="button" class="btn-secondary px-4 py-2 rounded-lg"
                                id="btn-cancel-sale-2">Cancel</button>
                            <button type="submit" class="btn-primary px-4 py-2 rounded-lg hover:bg-gray-800">Complete
                                Sale</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
