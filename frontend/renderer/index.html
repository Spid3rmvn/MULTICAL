<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8000">
  <title>MULTICAL</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <h1>MULTICAL</h1>
      </div>
      <nav class="header__nav">
        <a href="#" class="nav-link active" data-page="home">Home</a>
        <a href="#" class="nav-link" data-page="settings">Settings</a>
      </nav>
      <div class="header__status">
        <span id="backend-status" class="status-indicator status--loading">
          Connecting...
        </span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-container">
        <!-- Home Page -->
        <section id="page-home" class="page active">
          <div class="welcome-card">
            <h2>Welcome to MULTICAL</h2>
            <p>Your offline desktop application is ready.</p>
            <div class="app-info">
              <p><strong>Version:</strong> <span id="app-version">Loading...</span></p>
              <p><strong>Platform:</strong> <span id="app-platform">Loading...</span></p>
            </div>
          </div>
        </section>

        <!-- Settings Page -->
        <section id="page-settings" class="page">
          <div class="settings-card">
            <h2>Settings</h2>
            <form id="settings-form">
              <div class="form-group">
                <label for="theme">Theme</label>
                <select id="theme" name="theme">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
              </div>
              <button type="submit" class="btn btn--primary">Save Settings</button>
            </form>
          </div>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2024 MULTICAL. All rights reserved.</p>
    </footer>
  </div>

  <script src="assets/js/api/client.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
