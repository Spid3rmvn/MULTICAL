<!-- Products Page Content -->
<div id="page-products" class="page-content">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="page-title">Products</h1>
            <p class="page-subtitle">Life Savers, Chevrons, and Stripes inventory</p>
        </div>
        <button id="btn-add-product" class="flex items-center gap-2 btn-primary px-4 py-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Product
        </button>
    </div>

    <!-- Products Summary Cards -->
    <div class="grid grid-cols-5 gap-4 mb-6">
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Total</p>
            <p id="summary-total-products" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Life Savers</p>
            <p id="summary-life-savers" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Chevrons</p>
            <p id="summary-chevrons" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Stripes</p>
            <p id="summary-stripes" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Stock Value</p>
            <p id="summary-stock-value" class="text-xl font-semibold">KSh 0</p>
        </div>
    </div>

    <!-- Products Table -->
    <div class="dashboard-panel overflow-hidden">
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-table-body">
                <tr>
                    <td colspan="5" class="px-6 py-10 text-center text-gray-400">No products added yet</td>
                </tr>
            </tbody>
        </table>
        <div id="products-pagination"></div>
    </div>

    <!-- Add Product Modal -->
    <div id="modal-add-product" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Add New Product</h3>
                <button class="modal-close-btn" id="btn-close-product-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="add-product-form">
                <div class="modal-body">
                    <div class="space-y-5">
                        <!-- Product Type Selection -->
                        <div>
                            <label>Product Type</label>
                            <div id="product-type-selector" class="flex gap-2 mt-1">
                                <button type="button" data-type="life_saver"
                                    class="product-type-btn flex-1 px-4 py-2.5 border border-brand-500 bg-brand-50 text-brand-600 font-medium text-sm transition-all">
                                    Life Saver
                                </button>
                                <button type="button" data-type="chevron"
                                    class="product-type-btn flex-1 px-4 py-2.5 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all hover:border-gray-300">
                                    Chevron
                                </button>
                                <button type="button" data-type="stripes"
                                    class="product-type-btn flex-1 px-4 py-2.5 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all hover:border-gray-300">
                                    Stripes
                                </button>
                            </div>
                            <input type="hidden" name="product_type" id="product-type-input" value="life_saver">
                        </div>

                        <!-- Color Selection -->
                        <div id="color-section" class="hidden">
                            <label>Color</label>
                            <div id="product-color-selector" class="flex gap-2 mt-1">
                                <button type="button" data-color="white_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-2.5 border border-gray-900 bg-gray-50 font-medium text-sm transition-all flex items-center justify-center gap-2">
                                    <div class="flex -space-x-1">
                                        <div class="w-4 h-4 border border-gray-300" style="background-color: #ffffff;"></div>
                                        <div class="w-4 h-4 border border-gray-200" style="background-color: #ef4444;"></div>
                                    </div>
                                    White / Red
                                </button>
                                <button type="button" data-color="yellow_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-2.5 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all flex items-center justify-center gap-2">
                                    <div class="flex -space-x-1">
                                        <div class="w-4 h-4 border border-gray-200" style="background-color: #eab308;"></div>
                                        <div class="w-4 h-4 border border-gray-200" style="background-color: #ef4444;"></div>
                                    </div>
                                    Yellow / Red
                                </button>
                                <button type="button" data-color="white" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-2.5 border border-gray-900 bg-gray-50 font-medium text-sm transition-all flex items-center justify-center gap-2">
                                    <div class="w-4 h-4 border border-gray-300" style="background-color: #ffffff;"></div>
                                    White
                                </button>
                                <button type="button" data-color="yellow" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-2.5 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all flex items-center justify-center gap-2">
                                    <div class="w-4 h-4 border border-gray-200" style="background-color: #eab308;"></div>
                                    Yellow
                                </button>
                            </div>
                            <input type="hidden" name="product_color" id="product-color-input" value="white_red">
                        </div>

                        <!-- Size Selection -->
                        <div id="size-section" class="hidden">
                            <label>Size</label>
                            <div id="product-size-selector" class="flex gap-2 mt-1">
                                <button type="button" data-size="1x1"
                                    class="product-size-btn flex-1 px-4 py-2 border border-gray-900 bg-gray-50 font-medium text-sm transition-all">
                                    1x1
                                </button>
                                <button type="button" data-size="1x2"
                                    class="product-size-btn flex-1 px-4 py-2 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all hover:border-gray-300">
                                    1x2
                                </button>
                            </div>
                            <input type="hidden" name="product_size" id="product-size-input" value="1x1">
                        </div>

                        <!-- Stock Quantity -->
                        <div>
                            <label>Stock Quantity</label>
                            <input type="number" name="stock" required min="1" class="w-full mt-1" placeholder="0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary px-4 py-2 text-sm" id="btn-cancel-product">Cancel</button>
                    <button type="submit" class="btn-primary px-4 py-2 text-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
