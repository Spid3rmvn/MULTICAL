<!-- Products Page Content -->
<div id="page-products" class="page-content animate-fade-in">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Products</h1>
            <p class="text-sm text-gray-500 mt-1">Manage Life Savers, Chevrons, and Stripes inventory</p>
        </div>
        <button id="btn-add-product"
            class="flex items-center gap-2 btn-primary px-4 py-2 rounded-lg text-sm transition-all shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Product
        </button>
    </div>

    <!-- Products Summary Cards -->
    <div id="products-summary" class="grid grid-cols-5 gap-6 mb-6">
        <div class="stat-card-modern">
            <p class="text-sm text-gray-500 font-medium pb-1">Total Products</p>
            <p id="summary-total-products" class="text-2xl font-bold text-gray-900 mt-1">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-sm text-gray-500 font-medium pb-1">Life Savers</p>
            <p id="summary-life-savers" class="text-2xl font-bold text-gray-900 mt-1">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-sm text-gray-500 font-medium pb-1">Chevrons</p>
            <p id="summary-chevrons" class="text-2xl font-bold text-gray-900 mt-1">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-sm text-gray-500 font-medium pb-1">Stripes</p>
            <p id="summary-stripes" class="text-2xl font-bold text-gray-900 mt-1">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-sm text-gray-500 font-medium pb-1">Total Stock Value</p>
            <p id="summary-stock-value" class="text-2xl font-bold text-gray-900 mt-1">KSh 0</p>
        </div>
    </div>

    <!-- Products Table -->
    <div class="dashboard-panel overflow-hidden">
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-table-body" class="bg-white">
                <tr>
                    <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                        <div class="flex flex-col items-center justify-center">
                            <svg class="w-12 h-12 text-gray-300 mb-3" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                            </svg>
                            <p>No products added yet</p>
                            <button onclick="document.getElementById('btn-add-product').click()"
                                class="text-black font-semibold hover:underline text-sm mt-2">Add your first
                                product</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add Product Modal -->
    <div id="modal-add-product" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Add New Product</h3>
                <button class="modal-close-btn" id="btn-close-product-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <form id="add-product-form">
                <div class="modal-body">
                    <div class="grid grid-cols-1 gap-6">
                        <!-- Product Type Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Product Type</label>
                            <div id="product-type-selector" class="flex gap-3">
                                <button type="button" data-type="life_saver"
                                    class="product-type-btn flex-1 px-4 py-3 rounded-lg border-2 border-green-500 bg-green-50 text-green-800 font-medium text-sm transition-all hover:bg-green-100">
                                    <span class="block font-semibold">Life Saver</span>
                                </button>
                                <button type="button" data-type="chevron"
                                    class="product-type-btn flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-600 font-medium text-sm transition-all hover:bg-gray-50 hover:border-gray-300">
                                    <span class="block font-semibold">Chevron</span>
                                </button>
                                <button type="button" data-type="stripes"
                                    class="product-type-btn flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-600 font-medium text-sm transition-all hover:bg-gray-50 hover:border-gray-300">
                                    <span class="block font-semibold">Stripes</span>
                                </button>
                            </div>
                            <input type="hidden" name="product_type" id="product-type-input" value="life_saver">
                        </div>

                        <!-- Color Selection (Chevrons and Stripes) -->
                        <div id="color-section" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Color</label>
                            <div id="product-color-selector" class="flex gap-3">
                                <!-- Chevron colors (shown for chevrons) -->
                                <button type="button" data-color="white_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-3 rounded-lg border-2 border-gray-900 bg-gray-50 font-medium text-sm transition-all hover:bg-gray-100 flex items-center justify-center gap-2">
                                    <div class="flex -space-x-1">
                                        <div class="w-5 h-5 rounded-full border-2 border-gray-300"
                                            style="background-color: #ffffff;"></div>
                                        <div class="w-5 h-5 rounded-full border border-gray-200"
                                            style="background-color: #ef4444;"></div>
                                    </div>
                                    <span>White and Red</span>
                                </button>
                                <button type="button" data-color="yellow_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-600 font-medium text-sm transition-all hover:bg-gray-50 hover:border-gray-300 flex items-center justify-center gap-2">
                                    <div class="flex -space-x-1">
                                        <div class="w-5 h-5 rounded-full border border-gray-200"
                                            style="background-color: #eab308;"></div>
                                        <div class="w-5 h-5 rounded-full border border-gray-200"
                                            style="background-color: #ef4444;"></div>
                                    </div>
                                    <span>Yellow and Red</span>
                                </button>
                                <!-- Stripe colors (shown for stripes) -->
                                <button type="button" data-color="white" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-3 rounded-lg border-2 border-gray-900 bg-gray-50 font-medium text-sm transition-all hover:bg-gray-100 flex items-center justify-center gap-2">
                                    <div class="w-5 h-5 rounded-full border-2 border-gray-300"
                                        style="background-color: #ffffff;"></div>
                                    <span>White</span>
                                </button>
                                <button type="button" data-color="yellow" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-3 rounded-lg border-2 border-gray-200 bg-white text-gray-600 font-medium text-sm transition-all hover:bg-gray-50 hover:border-gray-300 flex items-center justify-center gap-2">
                                    <div class="w-5 h-5 rounded-full border border-gray-200"
                                        style="background-color: #eab308;"></div>
                                    <span>Yellow</span>
                                </button>
                            </div>
                            <input type="hidden" name="product_color" id="product-color-input" value="white_red">
                        </div>

                        <!-- Size Selection (Chevrons only) -->
                        <div id="size-section" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Size</label>
                            <div id="product-size-selector" class="flex gap-3">
                                <button type="button" data-size="1x1"
                                    class="product-size-btn flex-1 px-4 py-2.5 rounded-lg border-2 border-gray-900 bg-gray-50 font-medium text-sm transition-all hover:bg-gray-100">
                                    1x1
                                </button>
                                <button type="button" data-size="1x2"
                                    class="product-size-btn flex-1 px-4 py-2.5 rounded-lg border-2 border-gray-200 bg-white text-gray-600 font-medium text-sm transition-all hover:bg-gray-50 hover:border-gray-300">
                                    1x2
                                </button>
                            </div>
                            <input type="hidden" name="product_size" id="product-size-input" value="1x1">
                        </div>

                        <!-- Stock Quantity Only -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity</label>
                            <input type="number" name="stock" required min="1" class="w-full" placeholder="0">
                            <p class="text-xs text-gray-500 mt-1">Selling price will be set during sale</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary px-4 py-2 rounded-lg"
                        id="btn-cancel-product">Cancel</button>
                    <button type="submit" class="btn-primary px-4 py-2 rounded-lg shadow-sm">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
