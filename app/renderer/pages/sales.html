<!-- Sales Page Content -->
<div id="page-sales" class="page-content">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="page-title">Sales</h1>
            <p class="page-subtitle">Track all transactions</p>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-print-selected-sales" class="hidden flex items-center gap-2 px-4 py-2 text-sm bg-green-600 text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                </svg>
                Print (<span id="selected-count">0</span>)
            </button>
            <button id="btn-record-sale" class="flex items-center gap-2 btn-primary px-4 py-2 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Record Sale
            </button>
        </div>
    </div>

    <!-- Stats Summary -->
    <div id="sales-stats-container" class="grid grid-cols-4 gap-4 mb-6">
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Today's Sales</p>
            <h3 class="text-xl font-semibold" id="stat-today-sales">KSh 0</h3>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Transactions</p>
            <h3 class="text-xl font-semibold" id="stat-total-transactions">0</h3>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Product Sales</p>
            <h3 class="text-xl font-semibold" id="stat-product-sales">0</h3>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">All Time Revenue</p>
            <h3 class="text-xl font-semibold" id="stat-total-sales">KSh 0</h3>
        </div>
    </div>

    <!-- Sales Table -->
    <div class="dashboard-panel overflow-hidden">
        <div class="p-4 border-b border-gray-100">
            <h2 class="text-sm font-semibold">Today's Transactions</h2>
        </div>
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th class="w-10">
                        <input type="checkbox" id="select-all-sales" class="w-4 h-4">
                    </th>
                    <th>Time</th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Amount</th>
                    <th>Payment</th>
                    <th>Customer</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="sales-table-body">
                <tr>
                    <td colspan="8" class="px-5 py-10 text-center text-gray-400">No sales recorded today</td>
                </tr>
            </tbody>
        </table>
        <div id="sales-pagination"></div>
    </div>

    <!-- Record Sale Modal -->
    <div id="modal-record-sale" class="modal-overlay">
        <div class="modal-container" style="max-width: 760px;">
            <div class="modal-header">
                <h3 class="modal-title">Record New Sale</h3>
                <button class="modal-close-btn" id="btn-close-sale-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="modal-body">
                <!-- Sale Type Tabs -->
                <div class="flex gap-1 mb-5 p-1 bg-gray-100 w-fit mx-auto">
                    <button id="tab-stock-sale" class="px-4 py-2 bg-white text-gray-900 font-medium text-sm shadow-sm">
                        Stock Sale
                    </button>
                    <button id="tab-printing-sale" class="px-4 py-2 text-gray-500 font-medium text-sm">
                        Printing Service
                    </button>
                </div>

                <!-- Stock Sale Form -->
                <form id="stock-sale-form">
                    <div class="space-y-4">
                        <div>
                            <label>Stock Item</label>
                            <div id="stock-selector" class="mt-1"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label>Metres</label>
                                <input type="number" id="sale-metres" step="0.1" min="0.1" class="w-full mt-1" placeholder="0">
                            </div>
                            <div>
                                <label>Price per Metre (KSh)</label>
                                <input type="number" id="sale-price" step="1" min="1" class="w-full mt-1" placeholder="0">
                            </div>
                        </div>
                        <div>
                            <label>Payment Method</label>
                            <div id="payment-method-selector" class="mt-1"></div>
                        </div>
                        <div>
                            <label>Customer Name (Optional)</label>
                            <input type="text" id="sale-customer" class="w-full mt-1" placeholder="Walk-in customer">
                        </div>
                    </div>
                </form>

                <!-- Printing Sale Form -->
                <form id="printing-sale-form" class="hidden">
                    <div class="space-y-4">
                        <div>
                            <label>Printing Service</label>
                            <div id="printing-service-selector" class="mt-1"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label>Width (inches)</label>
                                <input type="number" id="printing-width" step="1" min="1" class="w-full mt-1" placeholder="24">
                            </div>
                            <div>
                                <label>Height (inches)</label>
                                <input type="number" id="printing-height" step="1" min="1" class="w-full mt-1" placeholder="18">
                            </div>
                        </div>
                        <div>
                            <label>Material Type</label>
                            <div id="material-type-selector" class="mt-1"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label>Quantity</label>
                                <input type="number" id="printing-qty" min="1" value="1" class="w-full mt-1">
                            </div>
                            <div>
                                <label>Total Amount (KSh)</label>
                                <input type="number" id="printing-total" step="1" min="1" class="w-full mt-1" placeholder="0">
                            </div>
                        </div>
                        <div>
                            <label>Payment Method</label>
                            <div id="printing-payment-selector" class="mt-1"></div>
                        </div>
                        <div>
                            <label>Customer Name (Optional)</label>
                            <input type="text" id="printing-customer" class="w-full mt-1" placeholder="Walk-in customer">
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary px-4 py-2 text-sm" id="btn-cancel-sale">Cancel</button>
                <button type="button" class="btn-primary px-4 py-2 text-sm" id="btn-submit-sale">Record Sale</button>
            </div>
        </div>
    </div>

    <!-- Date Picker Modal for Convert to Debt -->
    <div id="modal-sales-date-picker" class="modal-overlay" style="z-index: 9999;">
        <div class="modal-container" style="max-width: 450px;">
            <div class="modal-header">
                <h3 class="modal-title">Select Due Date</h3>
                <button class="modal-close-btn" id="btn-close-sales-date-picker">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- Calendar Header -->
                <div class="flex items-center justify-between mb-6">
                    <button type="button" id="btn-sales-picker-prev-month"
                        class="p-2 hover:bg-gray-100 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <h4 class="text-lg font-semibold text-gray-900" id="sales-picker-month-year">Month Year</h4>
                    <button type="button" id="btn-sales-picker-next-month"
                        class="p-2 hover:bg-gray-100 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>

                <!-- Calendar Grid -->
                <div class="calendar-grid" id="sales-picker-calendar-grid">
                    <!-- Day Headers -->
                    <div class="calendar-day-header">Sun</div>
                    <div class="calendar-day-header">Mon</div>
                    <div class="calendar-day-header">Tue</div>
                    <div class="calendar-day-header">Wed</div>
                    <div class="calendar-day-header">Thu</div>
                    <div class="calendar-day-header">Fri</div>
                    <div class="calendar-day-header">Sat</div>
                    <!-- Days will be dynamically generated -->
                </div>

                <!-- Actions -->
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                    <button type="button" id="btn-sales-clear-date" class="btn-secondary px-4 py-2">
                        Clear
                    </button>
                    <button type="button" id="btn-sales-today-date" class="btn-primary px-4 py-2">
                        Today
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
